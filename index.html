<!DOCTYPE html>
<html lang='fr'>
<head>
<meta charset='UTF-8'>
<title>Affichage dynamique – Marées & Météo Marine</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0f1d;
    color: white;
    font-family: Arial, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  .container { padding: 40px; }
  h1 { font-size: 70px; margin-bottom: 10px; text-align: center; font-weight: 300; }
  #clock { text-align: center; font-size: 45px; margin-bottom: 40px; opacity: 0.8; }
  .panel {
    background: #1c253d;
    padding: 40px;
    border-radius: 20px;
    margin-bottom: 40px;
  }
  .title { font-size: 50px; margin-bottom: 20px; text-align: center; }
  .value-big { font-size: 70px; text-align: center; font-weight: bold; }
  table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 45px; }
  th {
    background: #1c253d;
    padding: 25px;
    font-size: 40px;
    letter-spacing: 2px;
  }
  td {
    padding: 25px;
    text-align: center;
    border-bottom: 2px solid #2d3752;
  }
  tr:nth-child(even) { background: #141b2e; }
  .high { color: #4cd964; font-weight: bold; }
  .low { color: #ff3b30; font-weight: bold; }
</style>
</head>
<body>
<div class='container'>

  <h1>🌊 Marées & Météo Marine – Trébeurden</h1>
  <div id='clock'>--:--:--</div>

  <div class='panel'>
    <div class='title'>🌬 Vent actuel</div>
    <div id='wind' class='value-big'>Chargement…</div>
  </div>

  <div class='panel'>
    <div class='title'>🌕 Prochaine marée</div>
    <div id='nextTide' class='value-big'>Chargement…</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Heure</th>
        <th>Type</th>
      </tr>
    </thead>
    <tbody id='tideTable'></tbody>
  </table>

</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

async function loadWind() {
  try {
    const r = await fetch('https://render-3d8u.onrender.com/stormglass');
    const json = await r.json();
    const hour = json.hours[0];
    const speed = hour.windSpeed.sg;
    const direction = hour.windDirection.sg;
    document.getElementById('wind').innerHTML = `${speed} m/s – ${direction}°`;
  } catch (err) {
    document.getElementById('wind').textContent = 'Erreur vent';
  }
}

async function loadTides() {
  try {
    const r = await fetch('https://render-3d8u.onrender.com/tides');
    const json = await r.json();

    const tides = json.extremes.map(t => ({ type: t.type, date: new Date(t.date) }))
                             .sort((a, b) => a.date - b.date);

    const now = new Date();
    const next = tides.find(t => t.date > now);
    if (next) {
      const label = next.type === 'High' ? 'Haute mer' : 'Basse mer';
      const hour = next.date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('nextTide').innerHTML = `${label} à ${hour}`;
    }

    const tbody = document.getElementById('tideTable');
    tbody.innerHTML = '';

    tides.forEach(t => {
      const tr = document.createElement('tr');
      const h = t.date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      tr.innerHTML = `<td>${h}</td><td class='${t.type === 'High' ? 'high' : 'low'}'>${t.type === 'High' ? 'Haute mer' : 'Basse mer'}</td>`;
      tbody.appendChild(tr);
    });

  } catch (err) {
    document.getElementById('nextTide').innerText = 'Erreur marées';
  }
}

loadWind();
loadTides();
setInterval(() => { loadWind(); loadTides(); }, 10 * 60 * 1000);
</script>

</body>
</html>
